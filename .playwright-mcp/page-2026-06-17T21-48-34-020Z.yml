                      - link "Yes! (Also, what skin products not to mix and what to do if you have)" [ref=e2737] [cursor=pointer]:
                        - /url: /review/R22NSN9FQOETLS/ref=cm_cr_dp_d_rvw_ttl?ie=UTF8
                        - heading "Yes! (Also, what skin products not to mix and what to do if you have)" [level=5] [ref=e2738]
                      - generic [ref=e2739]: Reviewed in the United States on August 4, 2020
                      - link "Verified Purchase" [ref=e2743] [cursor=pointer]:
                        - /url: /gp/help/customer/display.html/ref=cm_cr_dp_d_rvw_avp?ie=UTF8&nodeId=G8UYX7LALQC8V9KA
                      - generic [ref=e2746]:
                        - generic [ref=e2752]:
                          - paragraph [ref=e2753]: No scent! Not too heavy! So far, so good!
                          - paragraph [ref=e2754]: "IMPORTANT NOTE: Be careful not to mix certain other skincare products or ingredients with it (no matter what the website may say!)."
                          - paragraph [ref=e2755]: To be helpful, I have made a list of things NOT to mix at the same time and important tips.
                          - paragraph [ref=e2756]: "However, to be sure, ask a professional dermatologist:"
                          - paragraph [ref=e2757]: "•DO NOT MIX:"
                          - paragraph [ref=e2758]: "-RETINOL should not be mixed with: Vitamin C, Vitamin E, AHA/BHA or Benzol Peroxide."
                          - paragraph [ref=e2759]: "-AHA/BHA should not be mixed with: Retinol, Vitamin C or Niacinamide (and possibly peptides but I am not 100% sure on that)."
                          - paragraph [ref=e2760]: "-VITAMIN C should not be mixed with Retinol, AHA/BHA or Niacinamide."
                          - paragraph [ref=e2761]: "-VITAMIN E should not be mixed with Retinol."
                          - paragraph [ref=e2762]: "-NIACINAMIDE should not be mixed with AHA/BHA or Vitamin C"
                          - paragraph [ref=e2763]: "-BENZOYL PEROXIDE should not be mixed with Retinol."
                          - paragraph [ref=e2764]: "NOTE: Both Retinol and AHA/BHA can be very helpful for various skin issues. While you should not MIX them, you can switch between them (example: Monday for Retinol, Tuesday for AHA/BHA, etc) nightly once your skin has been safely worked up to tolerating these more intense skin remedies. Do not try to do this all at once, right off the bat."
                          - paragraph [ref=e2765]: "•SUN AND CARE:"
                          - paragraph [ref=e2766]: "-While the Drunk Elephant website doesn’t always address this, in most cases RETINOL and AHA/BHA should be used at night as they cause sensitivity to the sun that can damage skin. I don’t know if applying sunscreen will fully keep your skin safe (not to mention all the reapplying). While you *may* be able to use it if you’re staying indoors, do understand that harmful rays can enter the home, car and workplace through windows. If you’re going to experience sun, regardless of what you do or do not put on your skin, an SPF of at least 30 should be an everyday routine (with reapplying)."
                          - paragraph [ref=e2767]: As for if you stay indoors, away from windows, one would assume hanging out in a dark room all day would suffice, but I’m no expert.
                          - paragraph [ref=e2768]: "-So it’s beat to use Retinol and AHA/BHA at night and wash it off in the morning. A cream or serum containing Vitamin C thrives off sunlight, so that is best to use in the daytime."
                          - paragraph [ref=e2769]: "•IF YOU OVERDO THE SKIN TREATMENTS AND YOUR SKIN IS FEELING DRY OR IRRITATED: Take a break from the harsh products and use very gentle ones for a little bit. Particularly CERAMIDES. These are gentle and help your skin to heal, calm and moisturize your skin. I personally have used (and liked) “Good Cera Super Ceramide Emulsion (pH 5.5 / 7 free)” which is a nice, gentle moisturizer. There are also things like ceramide masks that can help."
