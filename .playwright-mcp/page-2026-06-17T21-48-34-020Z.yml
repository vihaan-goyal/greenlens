                          - /url: /gp/help/customer/display.html/ref=cm_cr_dp_d_rvw_avp?ie=UTF8&nodeId=G8UYX7LALQC8V9KA
                      - paragraph [ref=e2575]: Well, I’m late on the drunk elephant train, and finally gave in. It’s been really hyped up over the past year or two and I never thought I’d try it. I thought it was just over priced to be honest, and I typically pay a lot for my skincare. I normally use skinceuticals, obagi, Paulas Choice and for drugstore brands cerave. Well I ended up using my cousins Drunk elephant cream while out of town and I loved the feeling and texture of it. I caved and ordered my own, and I am so glad I did. I love the way it makes my skin look and feel. It is very plumping but not greasy. I use a lot of serums and add this cream on top every day and night. It works nice under sunscreen and makeup. My skin looks and feels smoother. I will continue to buy it until/ if I find something I like more. I am in my 30s with sensitive skin and this cream does not bother my skin. For me personally it is light enough for summer but rich enough for winter. I can see why this cream is so popular. I ordered the B hydra serum also. Although it has gone viral and I was skeptical I would for sure recommend it after using it for some time now. Nice smoothing and plumping effects! I love the gel cream texture because it sinks in really well. My skin really absorbs it. I paid for this with my own hard earned money I do NOT do vine or whatever that free product stuff is just FYI.
